<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Verification report</title>
  <link rel="stylesheet" href="report.css" />
</head>
<body>
  <h1>Verification report</h1>
  <p class="muted">Actual screenshots captured during verification.</p>

  <ul>
    <li><span class="badge">verified</span> Describe what changed.</li>
    <li>Describe what the screenshot proves.</li>
  </ul>

  <div class="grid">
    <section>
      <h2>Before</h2>
      <img src="before.png" alt="Before screenshot" />
    </section>
    <section>
      <h2>After</h2>
      <img src="after.png" alt="After screenshot" />
    </section>
  </div>
</body>
</html>
